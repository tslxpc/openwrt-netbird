name: build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

# 修复：必须加这个，解决403、git推送、创建Release权限
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      update: ${{ env.update }}
      ver: ${{ env.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"
  
      - name: Check Version
        run: |
          REPO="netbirdio/netbird"
          latesttag=$(curl -sL https://api.github.com/repos/${REPO}/releases/latest | jq -r .tag_name)
          localetag=$(grep "^PKG_VERSION" netbird/Makefile | sed "s/.*=\(.*\)/\1/")
          
          latest_ver=${latesttag#v}
          if [ "${latest_ver}" != "${localetag}" ]; then
            PKG_VERSION="${latest_ver}"
            PKG_HASH="$(curl -sL https://codeload.github.com/${REPO}/tar.gz/v${PKG_VERSION} | sha256sum | cut -d ' ' -f 1)"
            sed -i "s/^PKG_VERSION.*/PKG_VERSION:=${PKG_VERSION}/" netbird/Makefile
            sed -i "s/^PKG_HASH.*/PKG_HASH:=${PKG_HASH}/" netbird/Makefile
            echo "package_version=${PKG_VERSION}" >>$GITHUB_ENV
            echo "update=true" >>$GITHUB_ENV
          else
            # ✅【仅新增这一行】无新版本时，赋值本地版本号，解决Release标签为空
            echo "package_version=${localetag}" >>$GITHUB_ENV
            echo "update=false" >>$GITHUB_ENV
          fi
          
      - name: Commit & Push
        if: env.update == 'true'
        run: |
          git add netbird/Makefile
          # 修复：原来日期引号语法错误
          git commit -m "update to v${{ env.package_version }} $(date +%Y-%m-%d\ %H:%M:%S)"
          git push

  build:
    name: Build - ${{ matrix.target.type }}-${{ matrix.target.arch }}
    needs: check
    if: needs.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # ==================== IPK 格式 (OpenWrt 24.10.5) 已改为 zst ====================
          - type: "ipk"
            arch: "aarch64_generic"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/rockchip/armv8/openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "arm_cortex-a9"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/bcm53xx/generic/openwrt-sdk-24.10.5-bcm53xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "arm_cortex-a15"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/ipq806x/generic/openwrt-sdk-24.10.5-ipq806x-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "aarch64_cortex-a53"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/bcm27xx/bcm2710/openwrt-sdk-24.10.5-bcm27xx-bcm2710_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "aarch64_cortex-a72"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/bcm27xx/bcm2711/openwrt-sdk-24.10.5-bcm27xx-bcm2711_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "arm_cortex-a7_neon-vfpv4"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/ipq40xx/generic/openwrt-sdk-24.10.5-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "x86_64"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "i386_pentium4"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/x86/generic/openwrt-sdk-24.10.5-x86-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "mips_74kc"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/ath79/generic/openwrt-sdk-24.10.5-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - type: "ipk"
            arch: "mipsel_24kc"
            sdk: "https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

          # ==================== APK 格式 (OpenWrt 25.12.3) 已改为 zst ====================
          - type: "apk"
            arch: "aarch64_generic"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/rockchip/armv8/openwrt-sdk-25.12.3-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "arm_cortex-a9"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/bcm53xx/generic/openwrt-sdk-25.12.3-bcm53xx-generic_gcc-14.3.0_musl_eabi.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "arm_cortex-a15"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/ipq806x/generic/openwrt-sdk-25.12.3-ipq806x-generic_gcc-14.3.0_musl_eabi.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "aarch64_cortex-a53"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/bcm27xx/bcm2710/openwrt-sdk-25.12.3-bcm27xx-bcm2710_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "aarch64_cortex-a72"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/bcm27xx/bcm2711/openwrt-sdk-25.12.3-bcm27xx-bcm2711_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "arm_cortex-a7_neon-vfpv4"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/ipq40xx/generic/openwrt-sdk-25.12.3-ipq40xx-generic_gcc-14.3.0_musl_eabi.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "x86_64"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "i386_pentium4"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/x86/generic/openwrt-sdk-25.12.3-x86-generic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "mips_74kc"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/ath79/generic/openwrt-sdk-25.12.3-ath79-generic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          - type: "apk"
            arch: "mipsel_24kc"
            sdk: "https://downloads.openwrt.org/releases/25.12.3/targets/ramips/mt7621/openwrt-sdk-25.12.3-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
          mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools \
          libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev python3-setuptools npm zstd
          sudo apt install --reinstall libc6
          sudo systemctl daemon-reload
          sudo apt -y autoremove --purge
          sudo apt clean

      - name: Install OpenWrt SDK
        run: |
          wget ${{ matrix.target.sdk }} -O openwrt-sdk.tar
          tar -I zstd -xf openwrt-sdk.tar
          mv -f openwrt-sdk-* openwrt-sdk

      - name: Build Package
        run: |
          cd openwrt-sdk
          cp -rf ../netbird ./package/
          # 修复：不重复插入feeds配置
          grep -q "netbird" feeds.conf.default || echo "src-link netbird $(pwd)/package" >> feeds.conf.default

          ./scripts/feeds update -a
          if [ -d ./feeds/packages/lang/golang ]; then
            rm -rf ./feeds/packages/lang/golang
            git clone --depth=1 -b 25.x https://github.com/sbwml/packages_lang_golang ./feeds/packages/lang/golang
          fi
          ./scripts/feeds install -a

          make defconfig
          make package/netbird/compile V=s CONFIG_NETBIRD_COMPRESS_UPX=y
          mkdir -p packed && find bin/ -type f -name '*netbird*' -exec mv -t packed {} +

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netbird-${{ matrix.target.type }}-${{ matrix.target.arch }}
          path: openwrt-sdk/packed/*.*k
          if-no-files-found: error

  # 新增：统一只执行一次发布，解决多架构重复创建Release报错
  release:
    needs: [check, build]
    if: needs.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.check.outputs.ver }}
          name: NetBird v${{ needs.check.outputs.ver }}
          files: all_files/**/*.*k
